<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="b1" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="b2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="55"/></filter>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#7090b8" opacity="0.22"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#060a14"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Orbs -->
  <circle cx="1120" cy="90"  r="320" fill="#00c896" opacity="0.13" filter="url(#b1)"/>
  <circle cx="120"  cy="560" r="280" fill="#7c5cfc" opacity="0.16" filter="url(#b2)"/>
  <circle cx="920"  cy="570" r="190" fill="#ff5f40" opacity="0.11" filter="url(#b1)"/>
  <circle cx="180"  cy="140" r="150" fill="#ffd166" opacity="0.10" filter="url(#b2)"/>

  <!-- Corner brackets -->
  <path d="M36 130 L36 36 L130 36"   fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M1244 130 L1244 36 L1150 36" fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M36 510 L36 604 L130 604" fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M1244 510 L1244 604 L1150 604" fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Eyebrow -->
  <line x1="300" y1="162" x2="420" y2="162" stroke="#00c896" stroke-width="1" stroke-opacity="0.6"/>
  <text x="640" y="168" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#00c896" text-anchor="middle" letter-spacing="7">ONLINE TUITION CLASSES</text>
  <line x1="860" y1="162" x2="980" y2="162" stroke="#00c896" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Glass card -->
  <rect x="230" y="188" width="820" height="340" rx="28"
        fill="#ffffff" fill-opacity="0.045"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Headline -->
  <text x="640" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="104" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-6">LEARN</text>
  <text x="640" y="388" font-family="system-ui,-apple-system,sans-serif" font-size="104" font-weight="900" fill="none" stroke="#00c896" stroke-width="2.5" text-anchor="middle" letter-spacing="-6">WITHOUT</text>
  <text x="640" y="486" font-family="system-ui,-apple-system,sans-serif" font-size="104" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-6">LIMITS</text>

  <!-- Divider -->
  <line x1="340" y1="504" x2="940" y2="504" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Tagline -->
  <text x="640" y="530" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#ffffff" fill-opacity="0.4" text-anchor="middle">Connecting curious minds with verified expert tutors — every subject, every level.</text>

  <!-- Subject pills -->
  <!-- Maths -->
  <rect x="286" y="550" width="148" height="44" rx="22" fill="#00c896" fill-opacity="0.10" stroke="#00c896" stroke-opacity="0.38" stroke-width="1"/>
  <text x="360" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="#00c896" text-anchor="middle">∑  Maths</text>

  <!-- Physics -->
  <rect x="450" y="550" width="166" height="44" rx="22" fill="#7c5cfc" fill-opacity="0.10" stroke="#7c5cfc" stroke-opacity="0.38" stroke-width="1"/>
  <text x="533" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="#a48fff" text-anchor="middle">⚛  Physics</text>

  <!-- Chemistry -->
  <rect x="632" y="550" width="204" height="44" rx="22" fill="#ff5f40" fill-opacity="0.10" stroke="#ff5f40" stroke-opacity="0.38" stroke-width="1"/>
  <text x="734" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="#ff8060" text-anchor="middle">⚗  Chemistry</text>

  <!-- Biology -->
  <rect x="852" y="550" width="148" height="44" rx="22" fill="#ffd166" fill-opacity="0.10" stroke="#ffd166" stroke-opacity="0.38" stroke-width="1"/>
  <text x="926" y="578" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="600" fill="#ffd166" text-anchor="middle">❋  Biology</text>

  <!-- Bottom caption -->
  <text x="640" y="622" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.22" text-anchor="middle" letter-spacing="4">CLASSES 1 – 12  ·  ONLINE  ·  FLEXIBLE TIMINGS</text>
</svg>
